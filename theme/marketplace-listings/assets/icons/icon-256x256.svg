<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3a5c;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for accent -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e86c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c54d1a;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGradient)"/>

  <!-- PDF Document icon -->
  <g transform="translate(40, 32)" filter="url(#shadow)">
    <!-- Document body -->
    <path d="M0 16 C0 7.16 7.16 0 16 0 L80 0 L112 32 L112 176 C112 184.84 104.84 192 96 192 L16 192 C7.16 192 0 184.84 0 176 Z"
          fill="#ffffff"/>
    <!-- Folded corner -->
    <path d="M80 0 L80 32 L112 32 Z" fill="#e0e0e0"/>
    <!-- PDF text -->
    <text x="56" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a5a8a" text-anchor="middle">PDF</text>
    <!-- Document lines -->
    <rect x="20" y="120" width="72" height="8" rx="4" fill="#d0d0d0"/>
    <rect x="20" y="140" width="56" height="8" rx="4" fill="#d0d0d0"/>
    <rect x="20" y="160" width="64" height="8" rx="4" fill="#d0d0d0"/>
  </g>

  <!-- Magnifying glass (SEO) -->
  <g transform="translate(140, 130)">
    <!-- Glass circle -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="url(#accentGradient)" stroke-width="8"/>
    <!-- Glass fill -->
    <circle cx="32" cy="32" r="20" fill="#ffffff" fill-opacity="0.9"/>
    <!-- Handle -->
    <line x1="52" y1="52" x2="76" y2="76" stroke="url(#accentGradient)" stroke-width="10" stroke-linecap="round"/>
    <!-- Magnifying glass shine -->
    <path d="M20 24 Q24 16 36 20" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Small chart bars (representing SEO/analytics) -->
  <g transform="translate(152, 142)">
    <rect x="0" y="12" width="6" height="12" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="10" y="6" width="6" height="18" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="20" y="0" width="6" height="24" rx="2" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
