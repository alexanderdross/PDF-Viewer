<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5a8a"/>
      <stop offset="100%" style="stop-color:#0d4a6f"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="1200" height="800" fill="#f5f5f5"/>
  <rect width="1200" height="60" fill="#e8e8e8"/>
  <circle cx="25" cy="30" r="8" fill="#ff5f57"/>
  <circle cx="50" cy="30" r="8" fill="#ffbd2e"/>
  <circle cx="75" cy="30" r="8" fill="#28ca42"/>
  <rect x="150" y="15" width="900" height="30" rx="6" fill="#ffffff"/>
  <text x="170" y="35" font-family="system-ui, sans-serif" font-size="12" fill="#666">https://example.com/pdf/</text>

  <!-- Page content -->
  <rect x="0" y="60" width="1200" height="740" fill="#ffffff"/>

  <!-- Site header -->
  <rect x="0" y="60" width="1200" height="70" fill="url(#headerGrad2)"/>
  <text x="40" y="102" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">PDF Embed &amp; SEO Optimize</text>

  <!-- Page title -->
  <text x="40" y="180" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">PDF Documents</text>
  <text x="40" y="210" font-family="system-ui, sans-serif" font-size="14" fill="#666">Browse all available PDF documents</text>

  <!-- View toggle -->
  <rect x="1040" y="160" width="50" height="30" rx="4" fill="#1a5a8a"/>
  <text x="1065" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">List</text>
  <rect x="1100" y="160" width="50" height="30" rx="4" fill="#e8e8e8"/>
  <text x="1125" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#666" text-anchor="middle">Grid</text>

  <!-- Document list items -->
  <!-- Item 1 -->
  <rect x="40" y="240" width="1120" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="260" width="60" height="60" rx="4" fill="#f0f0f0"/>
  <text x="90" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#e86c2c" text-anchor="middle">PDF</text>
  <text x="140" y="285" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Annual Report 2024</text>
  <text x="140" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#666">Financial overview and strategic highlights for fiscal year 2024</text>
  <text x="1000" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#999">24 pages</text>
  <text x="1000" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#999">2.4 MB</text>
  <rect x="1080" y="275" width="60" height="28" rx="4" fill="#1a5a8a"/>
  <text x="1110" y="294" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">View</text>

  <!-- Item 2 -->
  <rect x="40" y="360" width="1120" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="380" width="60" height="60" rx="4" fill="#f0f0f0"/>
  <text x="90" y="415" font-family="system-ui, sans-serif" font-size="12" fill="#e86c2c" text-anchor="middle">PDF</text>
  <text x="140" y="405" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Product Catalog Q1</text>
  <text x="140" y="430" font-family="system-ui, sans-serif" font-size="12" fill="#666">Complete product lineup with specifications and pricing</text>
  <text x="1000" y="405" font-family="system-ui, sans-serif" font-size="11" fill="#999">48 pages</text>
  <text x="1000" y="425" font-family="system-ui, sans-serif" font-size="11" fill="#999">8.1 MB</text>
  <rect x="1080" y="395" width="60" height="28" rx="4" fill="#1a5a8a"/>
  <text x="1110" y="414" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">View</text>

  <!-- Item 3 -->
  <rect x="40" y="480" width="1120" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="500" width="60" height="60" rx="4" fill="#f0f0f0"/>
  <text x="90" y="535" font-family="system-ui, sans-serif" font-size="12" fill="#e86c2c" text-anchor="middle">PDF</text>
  <text x="140" y="525" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">User Manual v3.0</text>
  <text x="140" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#666">Comprehensive guide for setup, configuration, and troubleshooting</text>
  <text x="1000" y="525" font-family="system-ui, sans-serif" font-size="11" fill="#999">156 pages</text>
  <text x="1000" y="545" font-family="system-ui, sans-serif" font-size="11" fill="#999">12.3 MB</text>
  <rect x="1080" y="515" width="60" height="28" rx="4" fill="#1a5a8a"/>
  <text x="1110" y="534" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">View</text>

  <!-- Item 4 -->
  <rect x="40" y="600" width="1120" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="620" width="60" height="60" rx="4" fill="#f0f0f0"/>
  <text x="90" y="655" font-family="system-ui, sans-serif" font-size="12" fill="#e86c2c" text-anchor="middle">PDF</text>
  <text x="140" y="645" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Privacy Policy</text>
  <text x="140" y="670" font-family="system-ui, sans-serif" font-size="12" fill="#666">Our commitment to protecting your personal information</text>
  <text x="1000" y="645" font-family="system-ui, sans-serif" font-size="11" fill="#999">8 pages</text>
  <text x="1000" y="665" font-family="system-ui, sans-serif" font-size="11" fill="#999">0.5 MB</text>
  <rect x="1080" y="635" width="60" height="28" rx="4" fill="#1a5a8a"/>
  <text x="1110" y="654" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">View</text>

  <!-- Screenshot label -->
  <rect x="0" y="760" width="1200" height="40" fill="#1a5a8a"/>
  <text x="600" y="785" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Screenshot 2: PDF archive list view with document details and quick actions</text>
</svg>
