<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- WordPress admin background -->
  <rect width="1200" height="800" fill="#f0f0f1"/>

  <!-- Admin header -->
  <rect width="1200" height="32" fill="#1d2327"/>
  <text x="50" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">WordPress</text>

  <!-- Admin sidebar -->
  <rect x="0" y="32" width="160" height="768" fill="#1d2327"/>
  <text x="20" y="70" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Dashboard</text>
  <text x="20" y="105" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Posts</text>
  <text x="20" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Pages</text>
  <text x="20" y="175" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">PDF Documents</text>
  <rect x="0" y="190" width="160" height="36" fill="#2271b1"/>
  <text x="20" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">Settings</text>
  <text x="30" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#2271b1">→ PDF Embed & SEO</text>

  <!-- Main content area -->
  <rect x="160" y="32" width="1040" height="768" fill="#f0f0f1"/>

  <!-- Page title -->
  <text x="200" y="80" font-family="system-ui, sans-serif" font-size="23" fill="#1d2327">PDF Embed &amp; SEO Settings</text>

  <!-- Settings card -->
  <rect x="180" y="100" width="800" height="650" fill="#ffffff" rx="4"/>

  <!-- Tabs -->
  <rect x="180" y="100" width="800" height="50" fill="#ffffff" stroke="#ddd"/>
  <rect x="180" y="100" width="120" height="50" fill="#ffffff"/>
  <rect x="180" y="147" width="120" height="3" fill="#2271b1"/>
  <text x="240" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#2271b1" text-anchor="middle">General</text>
  <text x="360" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#666" text-anchor="middle">Display</text>
  <text x="470" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#666" text-anchor="middle">SEO</text>
  <text x="570" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#666" text-anchor="middle">Advanced</text>

  <!-- Form fields -->
  <text x="220" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1d2327">Viewer Settings</text>

  <!-- Default Mode -->
  <text x="220" y="240" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Default Viewer Mode</text>
  <rect x="220" y="250" width="300" height="36" rx="4" fill="#ffffff" stroke="#8c8f94"/>
  <text x="230" y="274" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">In-Page Viewer ▼</text>

  <!-- Default Width -->
  <text x="220" y="320" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Default Width</text>
  <rect x="220" y="330" width="200" height="36" rx="4" fill="#ffffff" stroke="#8c8f94"/>
  <text x="230" y="354" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">100%</text>

  <!-- Default Height -->
  <text x="450" y="320" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Default Height</text>
  <rect x="450" y="330" width="200" height="36" rx="4" fill="#ffffff" stroke="#8c8f94"/>
  <text x="460" y="354" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">600px</text>

  <!-- Toolbar Options section -->
  <text x="220" y="420" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1d2327">Toolbar Options</text>

  <!-- Checkboxes -->
  <rect x="220" y="440" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="455" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="455" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Show toolbar by default</text>

  <rect x="220" y="475" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="490" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="490" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Enable download button</text>

  <rect x="220" y="510" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="525" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="525" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Enable print button</text>

  <rect x="220" y="545" width="18" height="18" rx="3" fill="#ffffff" stroke="#8c8f94"/>
  <text x="250" y="560" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Enable fullscreen button</text>

  <rect x="220" y="580" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="595" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="595" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Enable search in PDF</text>

  <!-- SEO Section -->
  <text x="220" y="650" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1d2327">SEO Settings</text>

  <rect x="220" y="670" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="685" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="685" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Generate XML sitemap for PDFs</text>

  <rect x="220" y="705" width="18" height="18" rx="3" fill="#2271b1"/>
  <text x="218" y="720" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">✓</text>
  <text x="250" y="720" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Add schema.org markup</text>

  <!-- Save button -->
  <rect x="220" y="750" width="120" height="36" rx="4" fill="#2271b1"/>
  <text x="280" y="774" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Save Changes</text>

  <!-- Pro badge -->
  <rect x="700" y="200" width="260" height="180" rx="8" fill="#f0f7fc" stroke="#2271b1"/>
  <text x="830" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2271b1" text-anchor="middle">PDF Embed Pro</text>
  <text x="720" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#666">✓ Password Protection</text>
  <text x="720" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#666">✓ Analytics Dashboard</text>
  <text x="720" y="315" font-family="system-ui, sans-serif" font-size="12" fill="#666">✓ Custom Branding</text>
  <text x="720" y="340" font-family="system-ui, sans-serif" font-size="12" fill="#666">✓ Priority Support</text>
  <rect x="760" y="355" width="140" height="28" rx="4" fill="#e86c2c"/>
  <text x="830" y="374" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Upgrade to Pro</text>

  <!-- Screenshot label -->
  <rect x="0" y="760" width="1200" height="40" fill="#1a5a8a"/>
  <text x="600" y="785" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Screenshot 5: Plugin settings page with viewer, toolbar, and SEO options</text>
</svg>
