<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- WordPress admin background -->
  <rect width="1200" height="800" fill="#f0f0f1"/>

  <!-- Admin header -->
  <rect width="1200" height="32" fill="#1d2327"/>
  <text x="50" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">WordPress</text>
  <circle cx="1150" cy="16" r="12" fill="#50575e"/>

  <!-- Admin sidebar -->
  <rect x="0" y="32" width="160" height="768" fill="#1d2327"/>
  <text x="20" y="70" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Dashboard</text>
  <rect x="0" y="85" width="160" height="36" fill="#2271b1"/>
  <text x="20" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">Posts</text>
  <text x="20" y="150" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Pages</text>
  <text x="20" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">PDF Documents</text>

  <!-- Editor area -->
  <rect x="160" y="32" width="1040" height="768" fill="#ffffff"/>

  <!-- Editor top bar -->
  <rect x="160" y="32" width="1040" height="56" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <rect x="180" y="46" width="80" height="28" rx="4" fill="#2271b1"/>
  <text x="220" y="65" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Publish</text>
  <text x="900" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Preview</text>
  <text x="1000" y="65" font-family="system-ui, sans-serif" font-size="13" fill="#1d2327">Settings</text>

  <!-- Post title -->
  <text x="350" y="140" font-family="Georgia, serif" font-size="40" fill="#1d2327">Add New Post</text>

  <!-- Content area with PDF block -->
  <rect x="280" y="180" width="640" height="400" rx="4" stroke="#2271b1" stroke-width="2" fill="#f0f7fc"/>

  <!-- Block toolbar -->
  <rect x="280" y="180" width="640" height="44" fill="#ffffff" stroke="#ddd"/>
  <rect x="290" y="190" width="24" height="24" rx="2" fill="#f0f0f1"/>
  <text x="302" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327" text-anchor="middle">⬚</text>
  <rect x="320" y="190" width="24" height="24" rx="2" fill="#f0f0f1"/>
  <text x="332" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327" text-anchor="middle">↑</text>
  <rect x="350" y="190" width="24" height="24" rx="2" fill="#f0f0f1"/>
  <text x="362" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327" text-anchor="middle">↓</text>
  <text x="400" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#2271b1" font-weight="bold">PDF Embed</text>

  <!-- PDF block content -->
  <rect x="300" y="244" width="600" height="320" fill="#ffffff" stroke="#ddd"/>

  <!-- Block icon and label -->
  <rect x="500" y="320" width="200" height="80" rx="8" fill="#f8f8f8" stroke="#e0e0e0"/>
  <text x="600" y="355" font-family="system-ui, sans-serif" font-size="32" fill="#e86c2c" text-anchor="middle">PDF</text>
  <text x="600" y="385" font-family="system-ui, sans-serif" font-size="12" fill="#666" text-anchor="middle">PDF Embed Block</text>

  <!-- Select PDF button -->
  <rect x="520" y="420" width="160" height="36" rx="4" fill="#2271b1"/>
  <text x="600" y="443" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Select PDF</text>

  <text x="600" y="490" font-family="system-ui, sans-serif" font-size="11" fill="#666" text-anchor="middle">Upload or select from Media Library</text>

  <!-- Right sidebar -->
  <rect x="960" y="88" width="240" height="712" fill="#ffffff" stroke="#ddd"/>
  <text x="980" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1d2327">PDF Embed Settings</text>

  <!-- Settings options -->
  <text x="980" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Display Mode</text>
  <rect x="980" y="170" width="200" height="32" rx="4" fill="#ffffff" stroke="#ddd"/>
  <text x="990" y="192" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">In-Page Viewer</text>

  <text x="980" y="230" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Width</text>
  <rect x="980" y="240" width="200" height="32" rx="4" fill="#ffffff" stroke="#ddd"/>
  <text x="990" y="262" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">100%</text>

  <text x="980" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Height</text>
  <rect x="980" y="310" width="200" height="32" rx="4" fill="#ffffff" stroke="#ddd"/>
  <text x="990" y="332" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">600px</text>

  <!-- Toggle options -->
  <text x="980" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Show Toolbar</text>
  <rect x="1140" y="365" width="36" height="20" rx="10" fill="#2271b1"/>
  <circle cx="1166" cy="375" r="8" fill="#ffffff"/>

  <text x="980" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Enable Download</text>
  <rect x="1140" y="405" width="36" height="20" rx="10" fill="#2271b1"/>
  <circle cx="1166" cy="415" r="8" fill="#ffffff"/>

  <text x="980" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#1d2327">Enable Print</text>
  <rect x="1140" y="445" width="36" height="20" rx="10" fill="#ccc"/>
  <circle cx="1150" cy="455" r="8" fill="#ffffff"/>

  <!-- Screenshot label -->
  <rect x="0" y="760" width="1200" height="40" fill="#1a5a8a"/>
  <text x="600" y="785" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Screenshot 4: Gutenberg block editor with PDF Embed block and settings sidebar</text>
</svg>
