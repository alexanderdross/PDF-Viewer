<svg xmlns="http://www.w3.org/2000/svg" width="772" height="250" viewBox="0 0 772 250">
  <defs>
    <linearGradient id="bannerBgSm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3d5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradSm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e86c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bannerBgSm)"/>

  <!-- Decorative elements -->
  <circle cx="700" cy="50" r="100" fill="#ffffff" opacity="0.03"/>
  <circle cx="50" cy="220" r="80" fill="#ffffff" opacity="0.02"/>

  <!-- Icon area -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="150" height="150" rx="24" fill="#ffffff" opacity="0.1"/>

    <!-- PDF Document mini -->
    <g transform="translate(20, 15)">
      <path d="M0 8 C0 3.6 3.6 0 8 0 L40 0 L56 16 L56 112 C56 116.4 52.4 120 48 120 L8 120 C3.6 120 0 116.4 0 112 Z"
            fill="#ffffff"/>
      <path d="M40 0 L40 16 L56 16 Z" fill="#e0e0e0"/>
      <text x="28" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a5a8a" text-anchor="middle">PDF</text>
    </g>

    <!-- Magnifying glass mini -->
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="22" fill="none" stroke="url(#accentGradSm)" stroke-width="5"/>
      <circle cx="25" cy="25" r="16" fill="#ffffff" fill-opacity="0.95"/>
      <line x1="42" y1="42" x2="58" y2="58" stroke="url(#accentGradSm)" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text content -->
  <g transform="translate(220, 0)">
    <text x="0" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">
      PDF Embed &amp; SEO Optimize
    </text>
    <text x="0" y="135" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" opacity="0.85">
      Make your PDFs discoverable by search engines
    </text>

    <!-- Feature tags -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="100" height="30" rx="15" fill="#ffffff" opacity="0.15"/>
      <text x="50" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">SEO</text>

      <rect x="110" y="0" width="100" height="30" rx="15" fill="#ffffff" opacity="0.15"/>
      <text x="160" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Sitemap</text>

      <rect x="220" y="0" width="100" height="30" rx="15" fill="#ffffff" opacity="0.15"/>
      <text x="270" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Schema</text>

      <rect x="330" y="0" width="100" height="30" rx="15" fill="url(#accentGradSm)"/>
      <text x="380" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Responsive</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="742" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.4" text-anchor="end">
    Dross:Media
  </text>
</svg>
