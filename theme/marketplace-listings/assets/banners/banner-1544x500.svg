<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d4a6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3d5c;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e86c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerBg)"/>

  <!-- Decorative circles -->
  <circle cx="1400" cy="100" r="200" fill="#ffffff" opacity="0.03"/>
  <circle cx="1500" cy="400" r="150" fill="#ffffff" opacity="0.02"/>
  <circle cx="100" cy="450" r="180" fill="#ffffff" opacity="0.02"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1544" height="500" fill="url(#grid)"/>

  <!-- Left side: Icon/Logo area -->
  <g transform="translate(80, 125)">
    <!-- Icon background -->
    <rect x="0" y="0" width="250" height="250" rx="40" fill="#ffffff" opacity="0.1"/>

    <!-- PDF Document -->
    <g transform="translate(30, 25)">
      <path d="M0 12 C0 5.4 5.4 0 12 0 L60 0 L84 24 L84 188 C84 194.6 78.6 200 72 200 L12 200 C5.4 200 0 194.6 0 188 Z"
            fill="#ffffff"/>
      <path d="M60 0 L60 24 L84 24 Z" fill="#e0e0e0"/>
      <text x="42" y="85" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a5a8a" text-anchor="middle">PDF</text>
      <rect x="15" y="110" width="54" height="6" rx="3" fill="#d0d0d0"/>
      <rect x="15" y="125" width="42" height="6" rx="3" fill="#d0d0d0"/>
      <rect x="15" y="140" width="48" height="6" rx="3" fill="#d0d0d0"/>
    </g>

    <!-- Magnifying glass -->
    <g transform="translate(130, 120)">
      <circle cx="40" cy="40" r="35" fill="none" stroke="url(#accentGrad)" stroke-width="8"/>
      <circle cx="40" cy="40" r="26" fill="#ffffff" fill-opacity="0.95"/>
      <line x1="66" y1="66" x2="95" y2="95" stroke="url(#accentGrad)" stroke-width="10" stroke-linecap="round"/>
      <!-- Chart inside magnifying glass -->
      <rect x="24" y="48" width="8" height="16" rx="2" fill="#1a5a8a" opacity="0.8"/>
      <rect x="36" y="40" width="8" height="24" rx="2" fill="#1a5a8a" opacity="0.8"/>
      <rect x="48" y="32" width="8" height="32" rx="2" fill="#e86c2c" opacity="0.9"/>
    </g>
  </g>

  <!-- Right side: Text content -->
  <g transform="translate(400, 0)">
    <!-- Main title -->
    <text x="0" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" filter="url(#textShadow)">
      PDF Embed &amp; SEO Optimize
    </text>

    <!-- Subtitle -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#ffffff" opacity="0.9">
      Make your PDFs discoverable by search engines
    </text>

    <!-- Feature badges -->
    <g transform="translate(0, 280)">
      <!-- Badge 1: SEO -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="180" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
        <text x="90" y="33" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">
          SEO Optimized
        </text>
      </g>

      <!-- Badge 2: XML Sitemap -->
      <g transform="translate(200, 0)">
        <rect x="0" y="0" width="180" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
        <text x="90" y="33" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">
          XML Sitemap
        </text>
      </g>

      <!-- Badge 3: Schema.org -->
      <g transform="translate(400, 0)">
        <rect x="0" y="0" width="180" height="50" rx="25" fill="#ffffff" opacity="0.15"/>
        <text x="90" y="33" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">
          Schema.org
        </text>
      </g>

      <!-- Badge 4: Responsive -->
      <g transform="translate(600, 0)">
        <rect x="0" y="0" width="180" height="50" rx="25" fill="url(#accentGrad)" opacity="0.9"/>
        <text x="90" y="33" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">
          Responsive
        </text>
      </g>
    </g>

    <!-- Platform icons -->
    <g transform="translate(0, 370)">
      <text x="0" y="20" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" opacity="0.7">
        Available for:
      </text>

      <!-- WordPress -->
      <g transform="translate(130, 0)">
        <circle cx="15" cy="15" r="15" fill="#ffffff" opacity="0.2"/>
        <text x="15" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">W</text>
        <text x="40" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">WordPress</text>
      </g>

      <!-- Drupal -->
      <g transform="translate(280, 0)">
        <circle cx="15" cy="15" r="15" fill="#ffffff" opacity="0.2"/>
        <text x="15" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">D</text>
        <text x="40" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">Drupal</text>
      </g>

      <!-- React -->
      <g transform="translate(400, 0)">
        <circle cx="15" cy="15" r="15" fill="#ffffff" opacity="0.2"/>
        <text x="15" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">R</text>
        <text x="40" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">React / Next.js</text>
      </g>
    </g>
  </g>

  <!-- Dross:Media branding -->
  <text x="1494" y="470" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.5" text-anchor="end">
    by Dross:Media
  </text>
</svg>
