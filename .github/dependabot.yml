version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/react-pdf-embed-seo"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 14
      semver-patch-days: 14
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    ignore:
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      typescript-and-types:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "jsdom"
          - "@vitejs/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      build-tools:
        patterns:
          - "tsup"
          - "turbo"
          - "eslint"
          - "prettier"
          - "@changesets/*"
        update-types:
          - "minor"
          - "patch"
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
