name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  react-tests:
    name: React/TypeScript Tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: react-pdf-embed-seo
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: react-pdf-embed-seo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  theme-tests:
    name: Theme PHPUnit Tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: theme
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpunit:10
          coverage: none
      - run: phpunit --testsuite Unit

  license-manager-tests:
    name: License Manager PHPUnit Tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: license-dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl
          tools: phpunit:10
          coverage: none
      - run: phpunit

  wordpress-tests:
    name: WordPress Plugin Tests
    runs-on: self-hosted
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, pdo_mysql
          tools: phpunit:9
          coverage: none

      - name: Install WordPress test suite
        run: |
          bash <(curl -s https://raw.githubusercontent.com/wp-cli/scaffold-command/main/templates/install-wp-tests.sh) \
            wordpress_test root root 127.0.0.1 latest true

      - name: Run free tier unit tests
        working-directory: wordpress-pdf-embed-seo
        run: cd tests && phpunit --testsuite unit

      - name: Run premium unit tests
        working-directory: wordpress-pdf-embed-seo
        run: cd tests && phpunit --testsuite unit --configuration ../premium/phpunit.xml

      - name: Run pro-plus unit tests
        working-directory: wordpress-pdf-embed-seo
        run: cd tests && phpunit --testsuite unit --configuration ../pro-plus/phpunit.xml

  drupal-tests:
    name: Drupal Module Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs
          coverage: none
      - name: Validate module structure
        run: |
          echo "=== Drupal Free Module ==="
          test -f drupal-pdf-embed-seo/pdf_embed_seo.info.yml || { echo "FAIL: missing info.yml"; exit 1; }
          test -f drupal-pdf-embed-seo/pdf_embed_seo.module || { echo "FAIL: missing .module"; exit 1; }
          echo "Free module structure OK"

          echo "=== Drupal Premium Module ==="
          test -f drupal-pdf-embed-seo/modules/pdf_embed_seo_premium/pdf_embed_seo_premium.info.yml || { echo "FAIL: missing premium info.yml"; exit 1; }
          echo "Premium module structure OK"

          echo "=== Drupal Pro+ Module ==="
          test -f drupal-pdf-embed-seo/modules/pdf_embed_seo_pro_plus/pdf_embed_seo_pro_plus.info.yml || { echo "FAIL: missing pro-plus info.yml"; exit 1; }
          echo "Pro+ module structure OK"

      - name: Check for PHP syntax errors
        run: |
          find drupal-pdf-embed-seo -name '*.php' -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "^No syntax errors" | head -20
          if find drupal-pdf-embed-seo -name '*.php' -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "^Parse error"; then
            echo "PHP syntax errors found!"
            exit 1
          fi
          echo "All PHP files pass syntax check."

      - name: Count test files
        run: |
          FREE=$(find drupal-pdf-embed-seo/tests -name '*Test.php' | wc -l)
          PREMIUM=$(find drupal-pdf-embed-seo/modules/pdf_embed_seo_premium/tests -name '*Test.php' 2>/dev/null | wc -l)
          PROPLUS=$(find drupal-pdf-embed-seo/modules/pdf_embed_seo_pro_plus/tests -name '*Test.php' 2>/dev/null | wc -l)
          echo "Free tests: $FREE, Premium tests: $PREMIUM, Pro+ tests: $PROPLUS"
          echo "Total: $(( FREE + PREMIUM + PROPLUS )) test files"

  dist-integrity:
    name: Distribution ZIP Integrity
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - name: Verify all dist ZIPs are valid
        run: |
          echo "Checking distribution ZIP integrity..."
          for zip in dist/*.zip; do
            if [ -f "$zip" ]; then
              echo "Verifying: $zip"
              unzip -t "$zip" > /dev/null || { echo "FAILED: $zip is corrupt"; exit 1; }
              echo "  OK ($(du -h "$zip" | cut -f1))"
            fi
          done
          echo "All distribution ZIPs verified."
      - name: Verify expected ZIPs exist
        run: |
          expected=(
            "dist/drupal-pdf-embed-seo-v1.2.17.zip"
            "dist/pdf-embed-seo-optimize-v1.2.13.zip"
            "dist/react-pdf-embed-seo-v1.2.12.zip"
            "dist/pdfviewer-theme-v2.2.97.zip"
            "dist/pdf-license-manager-v1.2.0.zip"
          )
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All expected distribution files present."
